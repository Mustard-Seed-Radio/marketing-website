name: Deploy MustardSeed site

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir build
          cp -r * build/ || true

      - name: Set domain depending on branch
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "mustardseed.gr" > build/CNAME
          else
            echo "dev.mustardseed.gr" > build/CNAME
          fi

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build