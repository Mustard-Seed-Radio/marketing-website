<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mustard Seed Radio</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="mustard-seed-logo.png">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #111111);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      color: #ff6f61;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
    }

    .tagline {
      font-size: 1.3rem;
      color: #ccc;
      margin-bottom: 1.5rem;
    }

    .tagline span {
      display: block;
      font-size: 1rem;
      color: #aaa;
      margin-top: 0.3rem;
    }

    /* Custom Player Button */
    #playBtn {
      background: linear-gradient(135deg, #ff6f61, #ffb347);
      color: #111;
      border: none;
      padding: 16px 32px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,111,97,0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      margin-bottom: 2rem;
    }

    #playBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255,111,97,0.8);
    }

    footer {
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #aaa;
    }

    @media (max-width:500px) {
      h1 { font-size: 2rem; }
      .tagline { font-size: 1rem; }
      #playBtn { font-size: 1rem; padding: 14px 26px; }
    }
  </style>
</head>
<body>

  <h1>🎧 Mustard Seed Radio - Ιντερνετικό Ραδιόφωνο</h1>
  
  <div class="tagline">
    Ακούστε ζωντανά όλο το 24ωρο
    <span>Streaming live 24/7</span>
  </div>

  <!-- Custom Player Button -->
  <button id="playBtn">▶ Play Live Radio</button>

  <footer>
    &copy; 2026 Mustard Seed Radio - all rights reserved.
  </footer>

  <!-- Howler.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

  <script>
    const sound = new Howl({
      src: ['https://centova.gr-net.gr/proxy/mustardseed/stream'],
      html5: true,
      volume: 1.0
    });

    const btn = document.getElementById("playBtn");

    btn.addEventListener("click", () => {
      if (sound.playing()) {
        sound.pause();
        btn.textContent = "▶ Play Live Radio";
      } else {
        sound.play();
        btn.textContent = "⏸ Pause";
      }
    });

    sound.on('loaderror', () => {
      btn.textContent = "⚠ Stream Error";
    });
  </script>

</body>
</html>
