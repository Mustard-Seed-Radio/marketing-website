<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mustard Seed Radio</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="mustard-seed-logo.png">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #111111);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      color: #ff6f61;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
    }

    .tagline {
      font-size: 1.3rem;
      color: #ccc;
      margin-bottom: 1.5rem;
    }

    .tagline span {
      display: block;
      font-size: 1rem;
      color: #aaa;
      margin-top: 0.3rem;
    }
    
    audio {
      width: 100%;
      max-width: 400px;
      margin-bottom: 2rem;
      border-radius: 10px;

      background: #111;
      accent-color: #ff6f61;

      box-shadow: 0 0 20px rgba(255,111,97,0.3);
    }

    /* Chrome / Safari */
    audio::-webkit-media-controls-panel {
      background-color: #111;
    }

    audio::-webkit-media-controls-play-button,
    audio::-webkit-media-controls-current-time-display,
    audio::-webkit-media-controls-time-remaining-display,
    audio::-webkit-media-controls-timeline,
    audio::-webkit-media-controls-volume-slider {
      filter: invert(1);
    }

    footer {
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #aaa;
    }

    @media (max-width:500px) {
      h1 { font-size: 2rem; }
      .tagline { font-size: 1rem; }
      audio { max-width: 90%; }
    }
  </style>
</head>
<body>

  <h1>🎧 Mustard Seed - Ιντερνετικό Ραδιόφωνο</h1>
  
  <div class="tagline">
    Ακούστε ζωντανά όλο το 24ωρο
    <span>Streaming live 24/7</span>
  </div>

  <!-- Live Radio Player -->
  <audio controls autoplay>
    <source src="https://centova.gr-net.gr/proxy/mustardseed/stream" type="audio/mpeg">
    Your browser does not support audio.
  </audio>

  <footer>
    &copy; 2026 Mustard Seed Radio - all rights reserved.
  </footer>

</body>
</html>
