<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mustard Seed Radio</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="mustard-seed-logo.png">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #111111);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo { width: 120px; height: 120px; object-fit:contain; margin-bottom:1rem; border-radius:50%; box-shadow:0 0 20px rgba(255,111,97,0.5); }
    h1 { font-size: 3rem; margin-bottom:0.5rem; color:#ff6f61; text-shadow:1px 1px 5px rgba(0,0,0,0.5); }
    .tagline { font-size: 1.3rem; color:#ccc; margin-bottom:1.5rem; }
    .tagline span { display:block; font-size:1rem; color:#aaa; margin-top:0.3rem; }

    audio { width:100%; max-width:400px; outline:none; margin-bottom:2rem; border-radius:10px; box-shadow:0 0 20px rgba(255,111,97,0.5); }

    /* Spotify embed */
    .spotify-embed { width:100%; max-width:400px; margin-bottom:2rem; border-radius:10px; overflow:hidden; box-shadow:0 0 20px rgba(30,215,96,0.5); }

    footer { margin-top:3rem; font-size:0.9rem; color:#aaa; }

    @media (max-width:500px) {
      h1 { font-size:2rem; }
      .tagline { font-size:1rem; }
      audio, .spotify-embed iframe { max-width:90%; }
      .logo { width:80px; height:80px; }
    }
  </style>
</head>
<body>

  <!-- Mustard Seed Logo -->
  <img src="mustard-seed-logo.png" alt="Mustard Seed Radio Logo" class="logo">

  <h1>🎧 Mustard Seed Radio</h1>
  
  <!-- Greek tagline -->
  <div class="tagline">
    Ακούστε ζωντανά όλο το 24ωρο
    <span>Streaming live 24/7</span>
  </div>

  <!-- Live Radio Player -->
  <audio controls autoplay>
    <source src="https://centova.gr-net.gr/proxy/mustardseed/stream" type="audio/mpeg">
    Your browser does not support audio.
  </audio>

  <!-- Spotify Podcast Embed -->
  <div class="spotify-embed">
    <iframe src="https://open.spotify.com/embed/show/4kvzzBW5EtqL6CZEVnzoEw?utm_source=generator" width="100%" height="152" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
  </div>

  <footer>
    &copy; 2026 Mustard Seed Radio. Όλα τα δικαιώματα διατηρούνται. <br>
    All rights reserved.
  </footer>

</body>
</html>
